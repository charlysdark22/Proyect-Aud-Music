<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Soundscape</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --fg: #e8e6e3;
            --muted: #6b6b7b;
            --accent: #c9a86c;
            --accent-dim: rgba(201, 168, 108, 0.15);
            --card: rgba(20, 20, 30, 0.6);
            --border: rgba(201, 168, 108, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display { font-family: 'Playfair Display', serif; }

        /* Overlay de entrada */
        .enter-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .enter-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .enter-btn {
            padding: 1.2rem 3rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .enter-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        /* Fondo animado */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201, 168, 108, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 90, 43, 0.06) 0%, transparent 50%),
                var(--bg);
        }

        .floating-orbs {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 { width: 400px; height: 400px; background: rgba(201, 168, 108, 0.08); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(139, 90, 43, 0.06); bottom: -50px; right: -50px; animation-delay: -7s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(201, 168, 108, 0.05); top: 50%; left: 50%; animation-delay: -14s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Visualizador */
        .visualizer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 60px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .visualizer.active { opacity: 1; }

        .bar {
            width: 3px;
            background: linear-gradient(to top, var(--accent), rgba(201, 168, 108, 0.3));
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* Contenido */
        .main-content {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .title {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 1s ease forwards;
            animation-delay: 0.3s;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 300;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 1s ease forwards;
            animation-delay: 0.6s;
        }

        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

        /* Indicador de audio */
        .audio-indicator {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.875rem;
            color: var(--muted);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .audio-indicator.visible { opacity: 1; }
        .audio-indicator.playing { color: var(--accent); }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--muted);
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .audio-indicator.playing .pulse-dot {
            background: var(--accent);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* Líneas decorativas */
        .lines { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
        .line { position: absolute; width: 1px; height: 100%; background: linear-gradient(to bottom, transparent, var(--border), transparent); opacity: 0.3; }
        .line:nth-child(1) { left: 20%; }
        .line:nth-child(2) { left: 50%; }
        .line:nth-child(3) { left: 80%; }

        /* Controles de audio (Barra inferior) */
        .audio-controls-wrapper {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem; /* Espacio entre botones */
            padding: 0.75rem 1.25rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .audio-controls-wrapper.visible { opacity: 1; }

        .ctrl-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .ctrl-btn:hover { color: var(--accent); transform: scale(1.1); }
        .ctrl-btn.active { color: var(--accent); }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            cursor: pointer;
            margin-left: 0.5rem; /* Separación del botón de mute */
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .orb, .pulse-dot, .bar { animation: none; }
            .title, .subtitle { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
    <!-- Overlay de entrada -->
    <div class="enter-overlay" id="enterOverlay">
        <h1 class="font-display text-4xl md:text-5xl tracking-wide" style="color: var(--accent);">Ambient Space</h1>
        <p class="text-sm tracking-widest uppercase" style="color: var(--muted);">Experiencia sonora inmersiva</p>
        <button class="enter-btn" id="enterBtn" aria-label="Entrar y activar audio">ENTRAR</button>
        <p class="text-xs" style="color: var(--muted); margin-top: 1rem;">Haz clic para activar el audio ambiental</p>
    </div>

    <!-- Fondo -->
    <div class="bg-pattern"></div>
    <div class="floating-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="lines">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <!-- Indicador de estado superior -->
    <div class="audio-indicator" id="audioIndicator">
        <span class="pulse-dot"></span>
        <span class="status-text" id="statusText">Audio activo</span>
    </div>

    <!-- Contenido principal -->
    <main class="main-content">
        <h1 class="font-display title" style="color: var(--fg);">
            Sumérgete en el<br>
            <span style="color: var(--accent);">Sonido Ambiental</span>
        </h1>
        <p class="subtitle">
            Una experiencia sonora continua que te acompaña mientras exploras. 
            La música fluye sin interrupciones hasta que decidas partir.
        </p>
    </main>

    <!-- Visualizador -->
    <div class="visualizer" id="visualizer"></div>

    <!-- Controles de Audio (Play, Mute, Volumen) -->
    <div class="audio-controls-wrapper" id="audioControls">
        <!-- Botón Play/Pause -->
        <button class="ctrl-btn active" id="playPauseBtn" aria-label="Pausar audio">
            <!-- Icono Pausa (estado inicial: reproduciendo) -->
            <svg id="iconPause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <!-- Icono Play (oculto inicialmente) -->
            <svg id="iconPlay" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                <polygon points="5,3 19,12 5,21"></polygon>
            </svg>
        </button>

        <!-- Botón Mute/Unmute -->
        <button class="ctrl-btn" id="muteBtn" aria-label="Silenciar audio">
            <!-- Icono Volumen On -->
            <svg id="iconVolOn" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <!-- Icono Volumen Off (oculto inicialmente) -->
            <svg id="iconVolOff" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
        </button>

        <!-- Slider de Volumen -->
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" aria-label="Control de volumen">
    </div>

    <script>
        // =====================
        // 1. CONFIGURACION INICIAL
        // =====================
        
        // Elementos del DOM
        const enterOverlay = document.getElementById('enterOverlay');
        const enterBtn = document.getElementById('enterBtn');
        const audioIndicator = document.getElementById('audioIndicator');
        const statusText = document.getElementById('statusText');
        const audioControls = document.getElementById('audioControls');
        const visualizerEl = document.getElementById('visualizer');
        
        // Controles
        const playPauseBtn = document.getElementById('playPauseBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        
        // Iconos
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const iconVolOn = document.getElementById('iconVolOn');
        const iconVolOff = document.getElementById('iconVolOff');

        // Variables de audio
        // Asegúrate de que 'audio.mp3' exista en la misma carpeta
        const audio = new Audio('./audio.mp3');
        audio.loop = true;
        audio.volume = 0.5;

        let animationId = null;
        const bars = [];
        const numBars = 32;

        // Crear barras del visualizador
        for (let i = 0; i < numBars; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '4px';
            visualizerEl.appendChild(bar);
            bars.push(bar);
        }

        // =====================
        // 2. FUNCIONES DE CONTROL
        // =====================

        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        function toggleMute() {
            audio.muted = !audio.muted;
            updateMuteIcon();
        }

        function updatePlayPauseIcon() {
            if (audio.paused) {
                iconPause.style.display = 'none';
                iconPlay.style.display = 'block';
                playPauseBtn.classList.remove('active');
                statusText.textContent = "Pausado";
                audioIndicator.classList.remove('playing');
            } else {
                iconPause.style.display = 'block';
                iconPlay.style.display = 'none';
                playPauseBtn.classList.add('active');
                statusText.textContent = "Audio activo";
                audioIndicator.classList.add('playing');
            }
        }

        function updateMuteIcon() {
            if (audio.muted) {
                iconVolOn.style.display = 'none';
                iconVolOff.style.display = 'block';
                muteBtn.classList.add('active');
            } else {
                iconVolOn.style.display = 'block';
                iconVolOff.style.display = 'none';
                muteBtn.classList.remove('active');
            }
        }

        // Visualizador animado simple
        function animateVisualizer() {
            bars.forEach((bar) => {
                if (!audio.paused) {
                    const height = Math.max(4, Math.random() * 50 + 10);
                    bar.style.height = height + 'px';
                } else {
                    bar.style.height = '4px';
                }
            });
            animationId = requestAnimationFrame(animateVisualizer);
        }

        // =====================
        // 3. EVENT LISTENERS
        // =====================

        // Inicio
        enterBtn.addEventListener('click', () => {
            enterOverlay.classList.add('hidden');
            
            // Intentar reproducir
            audio.play().catch(e => console.log("Error al reproducir:", e));
            
            // Mostrar UI
            setTimeout(() => {
                audioIndicator.classList.add('visible', 'playing');
                audioControls.classList.add('visible');
                visualizerEl.classList.add('active');
            }, 300);
            
            // Iniciar animación
            animateVisualizer();
        });

        // Botones de control
        playPauseBtn.addEventListener('click', togglePlay);
        muteBtn.addEventListener('click', toggleMute);

        // Volumen
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
            // Si movemos el slider, quitamos el mute automáticamente
            if (audio.muted) {
                audio.muted = false;
                updateMuteIcon();
            }
        });

        // Actualizar UI cuando el audio cambia de estado
        audio.addEventListener('play', updatePlayPauseIcon);
        audio.addEventListener('pause', updatePlayPauseIcon);

        // Pausar al cambiar de pestaña
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                audio.pause();
            } else {
                // Opcional: auto-resumir al volver
                // audio.play(); 
            }
        });

        // Teclado accesibilidad
        enterBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                enterBtn.click();
            }
        });
    </script>
</body>
</html>
